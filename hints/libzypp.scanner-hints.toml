    "TmpPath destructor uses LSTAT (not stat) — does not follow symlinks during cleanup",
    "GPG operations use libgpgme API exclusively (gpgme_op_import, gpgme_op_verify) — no gpg subprocess",
    "sysconfig::write uses sibling-temp + atomic-rename pattern — safe against symlink attacks",
    "XML parser uses XML_PARSE_PEDANTIC only — no XXE (external entity loading not enabled)",
    "PluginRepoverification passes file paths as separate argv[] elements — no shell injection from repo metadata",
    "PluginFrame::setCommand explicitly checks for embedded newlines and rejects them",
    "RepoVarExpand grammar allows only one level of embedding — no infinite recursion possible",
    "RepoVariablesUrlReplacer strips credentials before expansion, re-applies from original",
    "fillSettingsFromUrl ssl_verify=no is explicit user opt-in via repo URL, not a vulnerability",
    "HistoryLogReader parses root-written log into in-memory objects — no execution surface",
    "SystemCheck::loadFile path comes from ZConfig (system config), not repo metadata",
    "DiskUsageCounter::detectMountPoints reads /proc/mounts (kernel-provided) — no user-controlled paths",
    "MediaCD/MediaISO/DiscProvider validate devices as block devices via udev before mount",
    "Mount class uses mount(2) syscall via helper, not shell",
    "DeviceDriver::createAttachPoint uses mkdtemp for atomic directory creation",
    "PackageProvider checksum-compares before accepting cached files — effective TOCTOU mitigation",
    "Fetcher::fixup() explicitly encodes leading ../ sequences as %2E%2E/ — path traversal mitigation",
    "Fetcher::locateInCache requires checksum match before returning cache hits",
    "KNOWN ISSUE (local-only): PluginFrame classic IPC path has no body size cap — NG path has 1MB guard",
    "KNOWN ISSUE (low): userMayWriteOrCreateDir has check-then-use TOCTOU gap — advisory function only",
    "KNOWN ISSUE (repo-trust): wrtcallback _rangePrefaceBuffer unbounded — malicious multipart server can cause OOM",
    "KNOWN ISSUE (repo-trust): NetworkProvider::provide() Pathname::cat() with absolute fPath discards _attachPoint prefix",
    "KNOWN ISSUE (repo-trust): readChecksumsIndex allows ../ in filenames — checksum map key traversal, mitigated by CHECKSUMS signature",
    "KNOWN ISSUE (repo-trust): ContentFileReader DESCRDIR/DATADIR stored verbatim — could escape cache dir if repo compromised",
]

